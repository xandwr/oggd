name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.1)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT=$(git rev-parse HEAD)
          gh release create ${{ github.event.inputs.version }} \
            --title "oggd ${{ github.event.inputs.version }}" \
            --notes "## Godot Asset Library

          **Download commit:** \`${COMMIT}\`

          Paste this commit hash into the _Download Commit_ field when submitting or updating on the Godot Asset Library."
